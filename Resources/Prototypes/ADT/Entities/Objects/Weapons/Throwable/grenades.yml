- type: entity
  name: trick grenade kega
  description: All the grenade without any of the boom.
  parent: GrenadeBase
  id: ADTGrenadeKega
  suffix: Адмемы
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Grenades/grenade.rsi
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect
  - type: EmitSoundOnTrigger
    sound: /Audio/ADT/Effects/kega.ogg
  - type: Appearance
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/box_deploy.ogg

- type: entity
  name: TritiumGrenades
  description: Tritium Grenades
  parent: GrenadeBase
  id: ADTTritiumGrenades
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Grenades/tritiumgrenad/tritiumgrenades.rsi
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/Effects/cig_light.ogg"
  - type: IgnitionSource
    ignited: false
    temperature: 1000
  - type: IgniteOnTrigger
    keysIn:
    - timer
  - type: TimerTrigger
    delay: 2
  - type: ExplodeOnTrigger
    keysIn:
    - timer
  - type: TwoStageTrigger
    keysIn:
    - timer
    triggerDelay: 2
    components:
    - type: ExplodeOnTrigger
      keysIn:
      - stageTwo
    - type: Explosive
      explosionType: Radioactive
      totalIntensity: 150
      intensitySlope: 1
      maxIntensity: 100
      canCreateVacuum: false
    - type: DeleteOnTrigger
      keysIn:
      - stageTwo
  - type: SpawnOnTrigger
    keysIn:
    - timer
    proto: ADTTritiumGasSpawner
  - type: Appearance
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/glass_break1.ogg

- type: entity
  name: ADTGasSpawnerTritiumEffect
  description: Gas Spawner Tritium
  id: ADTTritiumGasSpawner
  components:
    - type: Clickable
    - type: InteractionOutline
    - type: Physics
      canCollide: false
    - type: Fixtures
    - type: Transform
      anchored: true
    - type: Sprite
      sprite: ADT/Objects/Weapons/Grenades/tritiumgrenad/effect.rsi
      state: miner
    - type: AtmosDevice
    - type: GasMiner
      spawnGas: Tritium
      maxExternalPressure: 300
      spawnAmount: 200
    - type: TimedDespawn
      lifetime: 0.5
    - type: Tag
      tags:
      - HideContextMenu
